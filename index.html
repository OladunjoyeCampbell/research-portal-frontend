<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Research Portal – Multi‑Study Participant Hub</title>
<style>
/* ========== Full CSS ========== */
:root{--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#475569;--primary:#1d4ed8;--p2:#2563eb;--success:#166534;--danger:#b91c1c;--warn:#92400e;--border:#dbe4f0;--soft:#eff6ff;--soft-warn:#fffbeb;--soft-ok:#ecfdf5;--shadow:0 12px 30px rgba(15,23,42,.08);}
*{box-sizing:border-box;margin:0;padding:0}
body{padding:20px;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(180deg,#f8fafc,#eef4ff);color:var(--text);line-height:1.5}
#app{max-width:960px;margin:0 auto}
.topbar{background:linear-gradient(135deg,#eff6ff,#f8fafc);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 22px 14px;display:flex;gap:14px;justify-content:space-between;flex-wrap:wrap;align-items:flex-start}
.brand h1{font-size:1.35rem;font-weight:800;letter-spacing:-.02em}
.brand p{color:var(--muted);font-size:.88rem;max-width:650px;margin-top:4px}
.topbar-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{border:none;padding:9px 15px;border-radius:999px;cursor:pointer;font-weight:700;font-size:.88rem;transition:transform .1s,background .15s}
.pill:hover{transform:translateY(-1px)}
.pill-blue{background:var(--primary);color:#fff}
.pill-gray{background:#e2e8f0;color:var(--text)}
.pill-green{background:#dcfce7;color:#166534}
.pill-amber{background:#fef9c3;color:#854d0e}
.pill-danger{background:#b91c1c;color:#fff}
.phase-strip{background:#fff;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:10px 22px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.phase-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#94a3b8;transition:all .2s}
.phase-dot.done{background:#dcfce7;border-color:#86efac;color:#166534}
.phase-dot.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.2)}
.phase-line{flex:1;height:2px;background:#e2e8f0;min-width:12px;max-width:30px}
.phase-label{font-size:.78rem;font-weight:700;color:var(--muted);margin-left:4px}
.main-card{background:#fff;border:1px solid var(--border);border-radius:0 0 24px 24px;padding:22px;box-shadow:var(--shadow)}
.section-title{font-size:1.25rem;font-weight:800;margin-bottom:6px}
.section-sub{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.prog-wrap{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:12px 14px;margin-bottom:18px}
.prog-row{display:flex;justify-content:space-between;font-weight:700;font-size:.9rem;margin-bottom:8px}
.prog-bar{height:9px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#06b6d4);border-radius:999px;transition:width .3s ease}
.card-grid{display:flex;flex-direction:column;gap:9px;min-height:50px}
.card{width:100%;border:1.5px solid #d7e0ec;border-radius:14px;background:#fff;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;transition:all .15s;font-size:.92rem}
.card:hover{border-color:#60a5fa;background:#f8fbff;transform:translateY(-1px)}
.card.seq{background:#edf4ff;border-color:#bfdbfe}
.card.locked{background:#f0fdf4;border-color:#86efac;cursor:default;opacity:.85}
.card.study-card{cursor:pointer;background:#fafafa;border-color:#e2e8f0}
.card.study-card:hover{transform:translateY(-2px);background:#f8fbff}
.card-emoji{font-size:1.15rem;width:26px;text-align:center;flex:0 0 auto}
.card-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card-lock{width:24px;height:24px;border-radius:50%;background:#86efac;color:#166534;font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card-label{flex:1;line-height:1.3}
.card-why{font-size:.8rem;color:var(--muted);margin-top:2px;font-style:italic}
.card-remove{color:#ef4444;font-weight:800;font-size:.95rem;margin-left:auto;padding:2px 4px}
.areas{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px}
.panel{flex:1 1 280px;min-width:260px}
.panel-title{font-size:.95rem;font-weight:700;margin-bottom:10px;color:var(--text)}
.prompt-box{background:#f8fbff;border:1px solid #dbeafe;border-radius:16px;padding:13px 15px;margin:12px 0;line-height:1.55;font-size:.92rem}
.subtle-box{color:var(--muted);font-size:.88rem;margin:0 0 14px;line-height:1.5}
.example-box{margin-top:14px;padding:13px 15px;border-radius:16px;background:#fafafa;border:1px dashed #cbd5e1;color:#334155;font-size:.88rem}
.hint-box{margin-top:12px;border-radius:16px;padding:12px 14px;background:var(--soft-warn);border:1px solid #fde68a;color:var(--warn);line-height:1.5;font-size:.9rem;display:none}
.misconception-box{margin-top:12px;border-radius:16px;padding:12px 14px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;line-height:1.5;font-size:.9rem;display:none}
.feedback-box{margin-top:14px;border-radius:16px;padding:13px 15px;border:1px solid transparent;min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;font-size:.92rem}
.fb-ok{background:var(--soft-ok);border-color:#bbf7d0;color:var(--success);font-weight:700}
.fb-bad{background:#fef2f2;border-color:#fecaca;color:var(--danger)}
.fb-neutral{background:#f8fafc;border-color:var(--border);color:var(--muted)}
.code-block{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:14px;font-family:'Courier New',monospace;font-size:.88rem;line-height:1.7;overflow-x:auto;white-space:pre;margin:14px 0}
.code-label{font-size:.8rem;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.q-wrap{margin-bottom:22px}
.q-text{font-weight:700;margin-bottom:12px;font-size:.95rem;line-height:1.45;white-space:pre-wrap}
.option-btn{width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;margin-bottom:8px;font-size:.9rem;transition:all .15s;display:flex;align-items:center;gap:10px}
.option-btn:hover{border-color:#60a5fa;background:#f8fbff}
.option-btn.selected{border-color:var(--primary);background:var(--soft);color:var(--primary);font-weight:700}
.option-btn.correct-ans{border-color:#86efac;background:#f0fdf4;color:var(--success);font-weight:700}
.option-btn.wrong-ans{border-color:#fca5a5;background:#fef2f2;color:var(--danger);font-weight:700}
.option-letter{width:26px;height:26px;border-radius:50%;background:#e2e8f0;color:var(--text);font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.reflect-q{background:#fefce8;border:1px solid #fde68a;border-radius:16px;padding:14px 16px;margin:14px 0;font-style:italic;color:#854d0e;font-size:.93rem;line-height:1.5}
textarea{width:100%;min-height:90px;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:.9rem;resize:vertical}
textarea:focus{outline:none;border-color:#60a5fa}
.survey-section{margin-bottom:22px}
.survey-section h3{font-size:1rem;font-weight:800;margin-bottom:14px;color:var(--primary);padding-bottom:6px;border-bottom:2px solid #dbeafe}
.field-row{margin-bottom:14px}
.field-row label{display:block;font-weight:700;font-size:.88rem;margin-bottom:6px}
.field-row select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:.9rem;background:#fff}
.likert-row{margin-bottom:16px}
.likert-row .lq{font-size:.9rem;margin-bottom:8px;line-height:1.45}
.likert-scale{display:flex;gap:6px;justify-content:space-between}
.lk-opt{flex:1;text-align:center}
.lk-opt input{display:none}
.lk-opt label{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border:1.5px solid var(--border);border-radius:10px;font-size:.75rem;color:var(--muted);transition:all .15s;background:#fafafa}
.lk-opt input:checked+label{border-color:var(--primary);background:var(--soft);color:var(--primary);font-weight:700}
.lk-num{font-size:1.1rem;font-weight:800}
.consent-box{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:16px 18px;max-height:340px;overflow-y:auto;font-size:.87rem;line-height:1.7;margin:14px 0;color:#334155}
.consent-check{display:flex;align-items:flex-start;gap:12px;padding:14px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;margin-top:12px;cursor:pointer}
.pcode-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:16px;padding:16px 20px;text-align:center;margin:16px 0}
.pcode-num{font-size:2rem;font-weight:900;letter-spacing:.15em;color:var(--primary);margin:6px 0}
.orient-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9}
.orient-icon{font-size:1.4rem;width:32px;text-align:center}
.saved-toast{position:fixed;bottom:22px;right:18px;z-index:9999;background:#166534;color:#fff;padding:9px 16px;border-radius:999px;font-size:.83rem;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,.22);opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.timeout-warning-toast{background:#d97706;white-space:normal;max-width:300px}
.resume-info{background:#f0fdf4;border:1.5px solid #86efac;border-radius:16px;padding:16px 18px;margin:14px 0}
.resume-phase{font-size:1.05rem;font-weight:800;color:var(--success);margin-bottom:8px}
.resume-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.resume-stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px;text-align:center}
.resume-stat .rnum{font-size:1.5rem;font-weight:900;color:var(--primary);line-height:1}
.resume-stat .rlbl{font-size:.78rem;color:var(--muted);margin-top:3px}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;justify-content:center}
.btn{border:none;border-radius:999px;padding:11px 20px;cursor:pointer;font-weight:700;font-size:.9rem;transition:transform .1s,background .15s;min-width:120px}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:#e2e8f0;color:var(--text)}
.btn-success{background:#16a34a;color:#fff}
.btn-warn{background:#d97706;color:#fff}
.btn-sm{padding:8px 14px;min-width:80px;font-size:.83rem}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:16px 0}
.stat-card{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.stat-num{font-size:2rem;font-weight:900;color:var(--primary);line-height:1}
.stat-label{font-size:.82rem;color:var(--muted);margin-top:4px}
.table-wrap{overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{background:#f1f5f9;padding:10px 12px;text-align:left;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
tr:hover td{background:#f8fbff}
.pill-score{padding:3px 9px;border-radius:999px;font-size:.78rem;font-weight:700}
.pill-hi{background:#dcfce7;color:#166534}
.pill-mid{background:#fef9c3;color:#854d0e}
.pill-lo{background:#fee2e2;color:#991b1b}
.study-step{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:.82rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:2px}
.step-label{font-weight:700;font-size:.92rem}
.step-why{font-size:.83rem;color:var(--muted);margin-top:4px;line-height:1.45}
.welcome-hero{text-align:center;padding:20px 0 10px}
.welcome-hero h2{font-size:1.7rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
.input-row{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:0 auto 20px}
.input-row label{font-weight:700;font-size:.88rem;margin-bottom:2px;display:block}
.input-row input{padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:.95rem;width:100%}
.score-hero{text-align:center;padding:20px 0}
.score-big{font-size:3.5rem;font-weight:900;color:var(--primary);line-height:1}
.gain-badge{display:inline-block;padding:8px 18px;border-radius:999px;font-weight:800;font-size:1rem;margin-top:8px}
.gain-pos{background:#dcfce7;color:#166534}
.gain-zero{background:#fef9c3;color:#854d0e}
.cert-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:20px;padding:24px;text-align:center;margin:20px 0}
.cert-name{font-size:1.4rem;font-weight:900;color:var(--primary);margin:8px 0}
.bottom-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
@media print{body{padding:0;background:#fff}.topbar,.phase-strip,.topbar-btns,.actions,.bottom-nav,.prog-wrap,.hint-box,.misconception-box,.feedback-box{display:none!important}.main-card{box-shadow:none;border:none;padding:8px}.card{break-inside:avoid}}
@media(max-width:640px){body{padding:10px}.main-card{padding:16px}.topbar{padding:14px 16px}.btn{flex:1}.welcome-hero h2{font-size:1.35rem}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// CONFIGURATION
// ============================================================
const API_BASE = 'https://campbell-research-portal-api.onrender.com'; // CHANGE TO YOUR RENDER URL
const ETHICS_REF = 'REC/NSPoly/CS/2026/___';
const RESEARCHER_CONTACT = 'Dr Oladele Campbell, ocampbell@csnigerpoly.com, 08030968896';

// ============================================================
// GLOBAL STATE
// ============================================================
let S = {
  phase: 'welcome',
  participantCode: null,
  participantName: '',
  participantMatric: '',
  demographics: {},
  consentGeneral: false,
  currentEnrolmentId: null,
  currentStudyId: null,
  randomisationGroup: null,
  studyConfig: null,
  puzzleIdx: 0,
  available: [], userSeq: [], fadedLocked: [],
  assQ: 0, assAnswers: [], assMode: 'pre',
  surveyAnswers: {},
  reviewQueue: [], reviewIdx: 0,
  metrics: null,
  audioOn: false,
  prevPhase: 'welcome',
  prevPuzzleIdx: 0,
  studyLang: 'en',
  lang: 'en',
  availableStudies: [],
  myEnrolments: [],
  lastInteraction: Date.now(),
  timeoutWarningShown: false,
  timeoutInterval: null
};

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function getProgrammeType(matric) {
  const prefix = (matric || '').split('/')[0].toUpperCase();
  if (prefix.startsWith('HND')) return 'hnd';
  if (prefix.startsWith('ND')) return 'nd';
  return 'other';
}
function L(obj, key) {
  if (S.studyConfig?.bilingual === true && obj && typeof obj === 'object' && (obj[key+'_en'] !== undefined || obj[key+'_ha'] !== undefined)) {
    return S.studyLang === 'en' ? obj[key+'_en'] : obj[key+'_ha'];
  }
  if (typeof obj === 'string') return obj;
  return obj && obj[key+'_en'] !== undefined ? obj[key+'_en'] : (obj[key] || '');
}
function shuffle(a) { let b = [...a]; for(let i=b.length-1; i>0; i--){ let j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function el(id) { return document.getElementById(id); }
function speak(text) {
  if(!S.audioOn || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = S.studyLang === 'ha' ? 'ha' : 'en';
    speechSynthesis.speak(u);
  } catch(e) { console.warn('Speech synthesis failed', e); }
}
function showSavedToast(msg) {
  const old = document.querySelector('.saved-toast');
  if(old) old.remove();
  const d = document.createElement('div');
  d.className = 'saved-toast';
  d.textContent = msg || 'Progress saved';
  document.body.appendChild(d);
  requestAnimationFrame(()=>d.style.opacity='1');
  setTimeout(()=>{d.style.opacity='0'; setTimeout(()=>d.remove(),300);},2500);
}
function saveLocalProgress() {
  if (!S.currentEnrolmentId) return;

  // Ensure resume state is captured inside metrics
  if (!S.metrics) S.metrics = {};
  S.metrics._resumeState = {
    phase: S.phase,
    puzzleIdx: S.puzzleIdx,
    assQ: S.assQ,
    assAnswers: [...(S.assAnswers || [])],
    assMode: S.assMode,
    surveyAnswers: { ...S.surveyAnswers },
    currentEnrolmentId: S.currentEnrolmentId,
    currentStudyId: S.currentStudyId,
    participantCode: S.participantCode
  };

  const toStore = {
    phase: S.phase,
    puzzleIdx: S.puzzleIdx,
    assQ: S.assQ,
    assAnswers: S.assAnswers,
    assMode: S.assMode,
    surveyAnswers: S.surveyAnswers,
    metrics: S.metrics,
    reviewQueue: S.reviewQueue,
    reviewIdx: S.reviewIdx,
    available: S.available,
    userSeq: S.userSeq,
    fadedLocked: S.fadedLocked,
    studyLang: S.studyLang,
    currentEnrolmentId: S.currentEnrolmentId,
    currentStudyId: S.currentStudyId,
    participantCode: S.participantCode,
    randomisationGroup: S.randomisationGroup,
    consentGeneral: S.consentGeneral,
    audioOn: S.audioOn
  };

  localStorage.setItem(`research_enrolment_${S.currentEnrolmentId}`, JSON.stringify(toStore));
  if (API_BASE && S.currentEnrolmentId) {
    fetch(`${API_BASE}/api/progress/${S.currentEnrolmentId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(toStore)
    }).catch(e => console.warn('Server sync failed:', e));
  }
  showSavedToast();
}
function loadLocalProgress() {
  if(!S.currentEnrolmentId) return null;
  const raw = localStorage.getItem(`research_enrolment_${S.currentEnrolmentId}`);
  if(raw) return JSON.parse(raw);
  return null;
}

// ============================================================
// API CALLS (with credentials for admin endpoints)
// ============================================================
async function apiFetchStudies() {
  if(!API_BASE) return [];
  try{
    const res = await fetch(`${API_BASE}/api/studies`);
    if(!res.ok) return [];
    return await res.json();
  }catch(e){ return []; }
}
async function apiFetchStudyConfig(studyId) {
  if(!API_BASE) return null;
  try{
    const res = await fetch(`${API_BASE}/api/studies/${studyId}/config`);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}
async function apiEnrol(name, matric, lang, studyId, demographics, consentGeneral, academicSession, classSection, lecturerId) {
  if(!API_BASE) throw new Error('API not configured');
  const res = await fetch(`${API_BASE}/api/enrol`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,matric,lang,studyId,demographics,consentGeneral,academicSession,classSection,lecturerId})
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function apiGetMyEnrolments(participantCode) {
  if(!API_BASE) return [];
  const res = await fetch(`${API_BASE}/api/enrolments/me?code=${encodeURIComponent(participantCode)}`);
  if(!res.ok) return [];
  return res.json();
}
async function apiLoadProgress(enrolmentId) {
  if(!API_BASE) return null;
  const res = await fetch(`${API_BASE}/api/progress/${enrolmentId}`);
  if(!res.ok) return null;
  return res.json();
}
async function apiWithdraw(enrolmentId) {
  if(!API_BASE) return;
  await fetch(`${API_BASE}/api/enrolment/${enrolmentId}/withdraw`,{method:'POST'});
}
async function apiAverageGain(studyId) {
  if(!API_BASE) return null;
  try{
    const res = await fetch(`${API_BASE}/api/study/${studyId}/average_gain`);
    if(!res.ok) return null;
    return res.json();
  }catch(e){ return null; }
}
async function apiAdminLogin(password) {
  const res = await fetch(`${API_BASE}/api/admin/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ password })
  });
  if (!res.ok) throw new Error('Login failed');
  return res.json();
}
async function apiExportCSV(studyId) {
  if(!API_BASE) return null;
  const res = await fetch(`${API_BASE}/api/admin/export/study/${studyId}?format=csv`, {
    credentials: 'include'
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.text();
}
async function apiExportJSON(studyId) {
  if(!API_BASE) return null;
  const res = await fetch(`${API_BASE}/api/admin/export/open-science/${studyId}`, {
    credentials: 'include'
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}
async function apiPortalStatus(studyId) {
  if(!API_BASE) return null;
  const res = await fetch(`${API_BASE}/api/admin/status?study=${studyId}`, {
    credentials: 'include'
  });
  if (!res.ok) return null;
  return await res.json();
}
async function apiPortalControl(studyId, status, capacity) {
  if(!API_BASE) return;
  const body = { study_id: studyId };
  if (status !== undefined) body.status = status;
  if (capacity !== undefined) body.capacity = capacity;
  await fetch(`${API_BASE}/api/admin/control`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify(body)
  });
}

// ============================================================
// POST-TEST DELAY CHECK
// ============================================================
function canStartPostTest() {
  const minDays = S.studyConfig?.min_days_between_pretest_posttest || 0;
  if (minDays === 0) return true;
  if (!S.metrics?.preCompletedAt) {
    console.warn('preCompletedAt missing, allowing post-test');
    return true;
  }
  const preDate = new Date(S.metrics.preCompletedAt);
  const now = new Date();
  const diffDays = (now - preDate) / (1000 * 60 * 60 * 24);
  return diffDays >= minDays;
}

// ============================================================
// SESSION TIMEOUT
// ============================================================
const TIMEOUT_MS = 20 * 60 * 1000;
const WARNING_MS = 1 * 60 * 1000;
function resetTimeoutTimer() {
  if (!S.currentEnrolmentId) return;
  S.lastInteraction = Date.now();
  if (S.timeoutWarningShown) {
    S.timeoutWarningShown = false;
    const toast = document.querySelector('.timeout-warning-toast');
    if (toast) toast.remove();
  }
  if (S.timeoutInterval) clearInterval(S.timeoutInterval);
  S.timeoutInterval = setInterval(checkTimeout, 10000);
}
function checkTimeout() {
  if (!S.currentEnrolmentId) return;
  const elapsed = Date.now() - S.lastInteraction;
  if (!S.timeoutWarningShown && elapsed >= (TIMEOUT_MS - WARNING_MS)) {
    S.timeoutWarningShown = true;
    showTimeoutWarning();
  }
  if (elapsed >= TIMEOUT_MS) {
    clearInterval(S.timeoutInterval);
    S.timeoutInterval = null;
    saveLocalProgress();
    showTimeoutToast();
  }
}
function showTimeoutWarning() {
  const div = document.createElement('div');
  div.className = 'saved-toast timeout-warning-toast';
  div.style.background = '#d97706';
  div.style.whiteSpace = 'normal';
  div.style.maxWidth = '300px';
  div.innerHTML = '⚠️ You have been inactive for a while. Your progress has been saved. You may close the browser and return later using your participant code.';
  document.body.appendChild(div);
  requestAnimationFrame(() => div.style.opacity = '1');
  setTimeout(() => {
    div.style.opacity = '0';
    setTimeout(() => div.remove(), 300);
  }, 8000);
}
function showTimeoutToast() {
  const div = document.createElement('div');
  div.className = 'saved-toast';
  div.style.background = '#166534';
  div.innerHTML = '💾 Progress saved due to inactivity. You can safely close the browser.';
  document.body.appendChild(div);
  requestAnimationFrame(() => div.style.opacity = '1');
  setTimeout(() => {
    div.style.opacity = '0';
    setTimeout(() => div.remove(), 300);
  }, 5000);
}

function phaseStripHTML() {
  if(S.phase === 'welcome' || S.phase === 'studySelect' || S.phase === 'adminLogin' || S.phase === 'dashboard') return '';
  const phases = [
    {k:'pre', l:'Pre-test'},
    {k:'learn',l:'Learn'},
    {k:'review',l:'Review'},
    {k:'post',l:'Post-test'},
    {k:'complete',l:'Done'}
  ];
  const groupMap = {orient:'pre',consent:'pre',survey:'pre',pre:'pre',study:'learn',faded:'learn',attempt:'learn',reflect:'learn',code:'learn',review:'review',post:'post',debrief:'post',complete:'complete',followup:'post',guided:'learn'};
  const cur = groupMap[S.phase] || 'pre';
  const order = ['pre','learn','review','post','complete'];
  const curIdx = order.indexOf(cur);
  return `<div class="phase-strip">${order.map((p,i)=>{
    const ph = phases.find(x=>x.k===p);
    const st = i<curIdx?'done':i===curIdx?'active':'';
    return `<span class="phase-dot ${st}" title="${ph.l}">${p==='pre'?'📋':p==='learn'?'👁':p==='review'?'🔁':p==='post'?'📋':'🎓'}</span>${i<order.length-1?'<span class="phase-line"></span>':''}`;
  }).join('')}<span class="phase-label">${phases.find(x=>x.k===cur).l}</span></div>`;
}

async function bindWelcome() {

    const matric = el('inpMatric')?.value.trim();

    S.participantName = name;
    S.participantMatric = matric;
    const academicSession = el('inpSession')?.value.trim() || '';
    const classSection = el('inpSection')?.value.trim() || '';
    const lecturerId = el('inpLecturer')?.value.trim() || '';
    S.availableStudies = await apiFetchStudies();
    if(!S.availableStudies.length) { el('welcomeErr').innerText = 'No open studies at this time.'; return; }
    try {
      const tempEnrol = await apiEnrol(name, matric, 'en', S.availableStudies[0].id, {}, false, academicSession, classSection, lecturerId);
      S.participantCode = tempEnrol.participantCode;
      S.randomisationGroup = tempEnrol.randomisationGroup;
      S.myEnrolments = await apiGetMyEnrolments(S.participantCode);
      const existingEnrol = S.myEnrolments.find(e => e.status !== 'completed');
      const completedEnrol = S.myEnrolments.find(e => e.status === 'completed');
      if (existingEnrol) {
        let local = loadLocalProgress();
        if (!local) {
          const remote = await apiLoadProgress(existingEnrol.id);
          if (remote?.progress) {
            local = remote.progress;
            localStorage.setItem(`research_enrolment_${existingEnrol.id}`, JSON.stringify(remote.progress));
          }
        }
        if (local) {
          Object.assign(S, local);
          S.currentEnrolmentId = existingEnrol.id;
          S.currentStudyId = existingEnrol.study_id;
          S.phase = 'resume';
        } else {
          S.phase = 'studySelect';
        }
      } else if (completedEnrol && loadLocalProgress()) {
        const local = loadLocalProgress();
        if (local) Object.assign(S, local);
        S.phase = 'complete';
      } else {
        S.phase = 'studySelect';
      }
      go();
    } catch(e) { el('welcomeErr').innerText = e.message; }
  };
}

async function onSelectStudy(studyId) {
  try {
    const config = await apiFetchStudyConfig(studyId);
    if(!config || !config.puzzles) throw new Error('Study configuration missing');
    S.studyConfig = config;
    S.studyLang = 'en';
    let enrolment = S.myEnrolments.find(e => e.study_id === studyId);
    if(enrolment) {
      S.currentEnrolmentId = enrolment.id;
      const local = loadLocalProgress();
      if(local) { Object.assign(S, local); if(local.studyLang) S.studyLang = local.studyLang; }
      else { const remote = await apiLoadProgress(enrolment.id); if(remote?.progress) Object.assign(S, remote.progress); }
      S.currentStudyId = studyId;
      S.randomisationGroup = enrolment.randomisation_group;
      S.phase = 'orient';
      resetTimeoutTimer();
    } else {
      const enrolRes = await apiEnrol(S.participantName, S.participantMatric, 'en', studyId, S.demographics, S.consentGeneral, '', '', '');
      S.currentEnrolmentId = enrolRes.enrolmentId;
      S.currentStudyId = studyId;
      S.randomisationGroup = enrolRes.randomisationGroup;
      S.myEnrolments.push({ id: enrolRes.enrolmentId, study_id: studyId, status: 'enrolled', study: { title_en: S.availableStudies.find(s=>s.id===studyId).title_en }, randomisation_group: S.randomisationGroup });
      S.metrics = { startedAt: Date.now(), puzzles: {} };
      saveLocalProgress();
      S.phase = 'orient';
      resetTimeoutTimer();
    }
    go();
  } catch(e) { alert(e.message); }
}

  fields.forEach(f => {
    if (f.id === 'programme') return;
    if(f.type === 'select') {
      const label = L(f, 'label');
      let opts = L(f, 'options');
      if (f.id === 'level') {
        const progType = getProgrammeType(S.participantMatric);
        if (S.studyConfig?.bilingual === true && S.studyLang === 'ha') {
          if (progType === 'nd') opts = ['ND Shekara 1','ND Shekara 2'];
          else if (progType === 'hnd') opts = ['HND Shekara 1','HND Shekara 2'];

        } else {
          if (progType === 'nd') opts = ['ND Year 1','ND Year 2'];
          else if (progType === 'hnd') opts = ['HND Year 1','HND Year 2'];
          else opts = ['Year 1','Year 2','Year 3','Year 4'];
        }
      }
      html += `<div class="field-row"><label>${label}</label><select data-field="${f.id}" class="sv-sel"><option value="">— select —</option>${opts.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>`;
    } else if(f.type === 'likert') {
      const label = L(f, 'label');
      const likert = (S.studyConfig?.bilingual === true && S.studyLang === 'ha') 
        ? ['Ƙi ƙwarai','Ƙi','A tsakiya','Yarda','Yarda ƙwarai']
        : ['Strongly Disagree','Disagree','Neutral','Agree','Strongly Agree'];
      html += `<div class="likert-row"><div class="lq">${label}</div><div class="likert-scale">${[1,2,3,4,5].map(n=>`<div class="lk-opt"><input type="radio" name="${f.id}" id="${f.id}_${n}" value="${n}" data-field="${f.id}" class="sv-lk"><label for="${f.id}_${n}"><span class="lk-num">${n}</span><span>${likert[n-1].split(' ')[0]}</span></label></div>`).join('')}</div></div>`;
    }
  });

function bindSurveyDynamic() {
  const fields = S.studyConfig.surveyFields || [];
  const btn = el('btnSurveyNext');
  if (btn) btn.disabled = true;
  const updateBtn = () => {
    const requiredFields = fields.filter(f => f.id !== 'programme');
    const allFilled = requiredFields.every(f => {
      const val = S.surveyAnswers[f.id];
      return val !== undefined && val !== null && val !== '';
    });
    if (btn) btn.disabled = !allFilled;
    const msg = el('surveyMsg');
    if (msg) {
      msg.textContent = allFilled ? '' : (S.lang === 'en' ? 'Please answer all questions.' : 'Don Allah amsa duk tambayoyin.');
    }
  };
  document.querySelectorAll('.sv-sel').forEach(sel => {
    sel.addEventListener('change', () => {
      S.surveyAnswers[sel.dataset.field] = sel.value;
      updateBtn();
    });
  });
  document.querySelectorAll('.sv-lk').forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.checked) S.surveyAnswers[radio.dataset.field] = parseInt(radio.value);
      updateBtn();
    });
  });
  updateBtn();
  el('btnSurveyNext')?.addEventListener('click', () => {
    saveLocalProgress();
    S.phase = 'pre';
    S.assMode = 'pre';
    S.assQ = 0;
    S.assAnswers = [];
    go();
  });
}
function renderAssessmentDynamic(mode) {
  if (mode === 'post' && !canStartPostTest()) {
    const minDays = S.studyConfig?.min_days_between_pretest_posttest || 0;
    const preDate = new Date(S.metrics.preCompletedAt);
    const now = new Date();
    const daysLeft = Math.ceil((preDate.getTime() + minDays * 24*60*60*1000 - now.getTime()) / (24*60*60*1000));
    return `<div class="main-card"><h2>Post‑test not yet available</h2>
            <p>The post‑test will be available after ${minDays} day(s). Please return in ${daysLeft} day(s).</p>
            <div class="actions"><button class="btn btn-primary" id="btnBackToStudies">← Back to studies</button></div></div>`;
  }
  const qs = mode === 'pre' ? S.studyConfig.preQ : S.studyConfig.postQ;
  if(!qs || !qs.length) return `<div class="main-card">No questions</div>`;
  const q = qs[S.assQ];
  const isAnswered = S.assAnswers[S.assQ] !== undefined;
  const chosen = S.assAnswers[S.assQ];
  const isPost = mode === 'post';
  return `${topbarHTML()}${phaseStripHTML()}<div class="main-card"><div class="prog-wrap"><div class="prog-row"><span>${mode==='pre'?'Pre‑test':'Post‑test'} – Question ${S.assQ+1}/${qs.length}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${((S.assQ+1)/qs.length)*100}%"></div></div></div>
  <div class="q-wrap"><p class="q-text">${L(q,'q')}</p>${(L(q,'opts')).map((opt,i)=>{
    let extra = '';
    if(isAnswered && (isPost || q.isAttention)) {
      if(i===q.correct) extra = ' correct-ans';
      else if(i===chosen && chosen!==q.correct) extra = ' wrong-ans';
    } else if(i===chosen) extra = ' selected';
    return `<button class="option-btn${extra}" data-idx="${i}" ${isAnswered?'disabled':''}>${'ABCD'[i]}. ${opt}</button>`;
  }).join('')}</div>

function bindAttemptDynamic(reviewMode = false) {
  const p = reviewMode ? S.studyConfig.puzzles[S.reviewQueue[S.reviewIdx]] : S.studyConfig.puzzles[S.puzzleIdx];
  const expectedCards = p.cards.map(c=>c.id).sort().join(',');
  const actualCards = [...S.available,...S.userSeq].map(c=>c.id).sort().join(',');
  if (expectedCards !== actualCards) {
    S.fadedLocked = [];

    renderCardsDynamic();

  });
  el('btnPrint')?.addEventListener('click',()=>window.print());
  el('btnSubmit')?.addEventListener('click',()=>{
    const m = reviewMode ? null : puzMetric(p.id);
    if (!reviewMode && !m) return;
    const order = S.userSeq.map(c=>c.id);
    const correct = JSON.stringify(order) === JSON.stringify(p.correctOrder);
    const fb = el('attemptFB'), hb = el('attemptHint'), mb = el('attemptMiscon');
    const key = order.join(',');
    const miscon = p.misconceptions?.[key];
    if (correct) {
      if (!reviewMode) {
        if (!S.metrics.puzzles[p.id]) S.metrics.puzzles[p.id] = {};
        S.metrics.puzzles[p.id].completed = true;
        S.metrics.puzzles[p.id].ms = Date.now() - (S.metrics.startedAt || Date.now());
        saveLocalProgress();
      }
      fb.className='feedback-box fb-ok';
      fb.textContent='✅ Correct! Great thinking.';
      hb.style.display='none';
      mb.style.display='none';
      speak('Correct! Well done.');
      setTimeout(()=>{
        if (reviewMode) {
          if (S.reviewIdx < S.reviewQueue.length - 1) {
            S.reviewIdx++;
            const rp = S.studyConfig.puzzles[S.reviewQueue[S.reviewIdx]];
            if (rp) { S.fadedLocked = []; S.available = shuffle(rp.cards); S.userSeq = []; }
            go();
          } else {
            if (canStartPostTest()) {
              S.phase = 'post';
              S.assMode = 'post';
              S.assQ = 0;
              S.assAnswers = [];
              go();
            } else {
              const minDays = S.studyConfig.min_days_between_pretest_posttest || 0;
              const preDate = new Date(S.metrics.preCompletedAt);
              const now = new Date();
              const daysLeft = Math.ceil((preDate.getTime() + minDays * 24*60*60*1000 - now.getTime()) / (24*60*60*1000));
              alert(`The post‑test will be available after ${minDays} day(s). Please return in ${daysLeft} day(s).`);
              S.phase = 'studySelect';
              go();
            }
          }
        } else {
          S.phase = 'reflect';
          go();
        }
      }, 1000);
    } else {
      if (!reviewMode) {
        if (!m.attempts) m.attempts = 0;
        m.attempts++;
        m.wrongs.push(key);
        m.hints++;
        const MAX_ATTEMPTS = 3;
        if (m.attempts >= MAX_ATTEMPTS) {
          m.guided = true;
          m.completed = true;
          m.ms = Date.now() - (m.startTs || Date.now());
          saveLocalProgress();
          fb.className = 'feedback-box fb-bad';
          fb.textContent = 'Showing solution…';
          setTimeout(() => { S.phase = 'guided'; go(); }, 900);
          return;
        }
      }
      fb.className = 'feedback-box fb-bad';
      fb.textContent = `❌ Not yet. Try again. (Attempt ${m?.attempts || '?'} of 3)`;
      if (miscon) {
        mb.textContent = '⚠️ ' + miscon;
        mb.style.display = 'block';
      } else {
        mb.style.display = 'none';
      }
      hb.textContent = '💡 ' + (p.misconceptions?.[key] || L(p, 'subtle'));
      hb.style.display = 'block';
      speak('Not quite. Try again.');
    }
  });
}
function initReviewDynamic() {
  const completed = S.studyConfig.puzzles.filter((_,idx)=>S.metrics.puzzles[idx]?.completed).map((_,idx)=>idx);
  let pool = completed.slice();
  if(pool.length < 3){
    const incomplete = S.studyConfig.puzzles.map((_,i)=>i).filter(i=>!completed.includes(i));
    const needed = 3 - pool.length;
    pool.push(...incomplete.slice(0, needed));
  }
  S.reviewQueue = shuffle(pool).slice(0,3);
  S.reviewIdx = 0;
  S.phase = 'review';
  const rp = S.studyConfig.puzzles[S.reviewQueue[0]];
  if(rp){ S.fadedLocked=[]; S.available=shuffle(rp.cards); S.userSeq=[]; }
}
function advanceReview() {
  if (S.reviewIdx < S.reviewQueue.length - 1) {
    S.reviewIdx++;
    const rp = S.studyConfig.puzzles[S.reviewQueue[S.reviewIdx]];
    if (rp) { S.fadedLocked = []; S.available = shuffle(rp.cards); S.userSeq = []; }
    go();
  } else {
    if (canStartPostTest()) {
      S.phase = 'post';
      S.assMode = 'post';
      S.assQ = 0;
      S.assAnswers = [];
      go();
    } else {
      const minDays = S.studyConfig.min_days_between_pretest_posttest || 0;
      const preDate = new Date(S.metrics.preCompletedAt);
      const now = new Date();
      const daysLeft = Math.ceil((preDate.getTime() + minDays * 24 * 60 * 60 * 1000 - now.getTime()) / (24 * 60 * 60 * 1000));
      alert(`The post‑test will be available after ${minDays} day(s). Please return in ${daysLeft} day(s).`);
      S.phase = 'studySelect';
      go();
    }
  }
}

          <div class="stat-card"><div class="stat-num">${inProgress}</div><div class="stat-label">In progress</div></div>
          <div class="stat-card"><div class="stat-num">${completed}</div><div class="stat-label">Completed</div></div>
          <div class="stat-card"><div class="stat-num">${spacesLeft}</div><div class="stat-label">Spaces left</div></div>
        `;
      }
      const statusOpen = status.status === 'open';
      const mgmtHtml = `
        <div class="portal-status ${statusOpen ? 'ps-open' : 'ps-closed'}">
          <span class="status-badge ${statusOpen ? 'sb-open' : 'sb-closed'}">${statusOpen ? 'OPEN' : 'CLOSED'}</span>
          <span style="font-weight:700">${enrolled}/${capacity} enrolled</span>
          <div class="pipeline-bar" style="flex:1;min-width:120px">
            <div class="pb-done" style="width:${capacity>0?Math.round((completed/capacity)*100):0}%"></div>
            <div class="pb-prog" style="width:${capacity>0?Math.round(((enrolled-completed)/capacity)*100):0}%"></div>
            <div class="pb-idle" style="flex:1"></div>
          </div>
          <span style="font-size:.82rem">${Math.round((enrolled/capacity)*100)}% capacity</span>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0">
          <button class="btn btn-success btn-sm" id="btnPortalOpen" ${statusOpen ? 'disabled' : ''}>✅ Open enrolment</button>
          <button class="btn btn-warn btn-sm" id="btnPortalClose" ${!statusOpen ? 'disabled' : ''}>🔒 Close enrolment</button>
          <label style="font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:6px">
            Capacity: <input id="inpCap" type="number" min="1" max="500" value="${capacity}" style="width:80px;padding:6px;border-radius:10px;border:1.5px solid var(--border)">
            <button class="btn btn-secondary btn-sm" id="btnSetCap">Set</button>
          </label>
        </div>
      `;
      const panel = document.getElementById('portalMgmtPanel');
      if (panel) panel.innerHTML = mgmtHtml;
      document.getElementById('btnPortalOpen')?.addEventListener('click', async () => {
        await apiPortalControl(S.currentStudyId, 'open', undefined);
        refreshPortalStatus();
      });
      document.getElementById('btnPortalClose')?.addEventListener('click', async () => {
        await apiPortalControl(S.currentStudyId, 'closed', undefined);
        refreshPortalStatus();
      });
      document.getElementById('btnSetCap')?.addEventListener('click', async () => {
        const newCap = parseInt(document.getElementById('inpCap')?.value || '100');
        if (newCap > 0) await apiPortalControl(S.currentStudyId, undefined, newCap);
        refreshPortalStatus();
      });
    } catch (e) {
      console.warn('Failed to load portal status', e);
      const panel = document.getElementById('portalMgmtPanel');
      if (panel) panel.innerHTML = '<div class="example-box">Could not load portal status. Make sure you are logged in as admin.</div>';
    }
  }
  el('btnExportCSV')?.addEventListener('click', async () => {
    try {
      if (!S.currentStudyId) throw new Error('No study selected');
      const csv = await apiExportCSV(S.currentStudyId);
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `study_${S.currentStudyId}_export.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showSavedToast('CSV exported');
    } catch(e) {
      alert('Export failed: ' + e.message);
    }
  });
  el('btnExportJSON')?.addEventListener('click', async () => {
    try {
      if (!S.currentStudyId) throw new Error('No study selected');
      const jsonData = await apiExportJSON(S.currentStudyId);
      const blob = new Blob([JSON.stringify(jsonData, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `study_${S.currentStudyId}_export.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showSavedToast('JSON exported');
    } catch(e) {
      alert('Export failed: ' + e.message);
    }
  });
  el('btnClearLocalData')?.addEventListener('click', () => {
    if (confirm('Clear all local enrolment data? This cannot be undone. Data on the server remains unaffected.')) {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('research_enrolment_'));
      keys.forEach(k => localStorage.removeItem(k));
      showSavedToast('Local data cleared');
    }
  });
  el('btnDashBack')?.addEventListener('click', () => {
    S.phase = S.prevPhase || 'studySelect';
    go();
  });
  refreshPortalStatus();
}
function renderFollowupDynamic() {
  const qs = S.studyConfig.postQ;
  if (!qs || !qs.length) return `<div class="main-card">No follow‑up questions</div>`;
  const q = qs[S.assQ];
  const isAnswered = S.assAnswers[S.assQ] !== undefined;
  const chosen = S.assAnswers[S.assQ];
  return `${topbarHTML()}${phaseStripHTML()}<div class="main-card"><div class="prog-wrap"><div class="prog-row"><span>Delayed Post‑test – Question ${S.assQ+1}/${qs.length}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${((S.assQ+1)/qs.length)*100}%"></div></div></div>
  <div class="q-wrap"><p class="q-text">${L(q,'q')}</p>${(L(q,'opts')).map((opt,i)=>{
    let extra = '';
    if(isAnswered) {
      if(i===q.correct) extra = ' correct-ans';
      else if(i===chosen && chosen!==q.correct) extra = ' wrong-ans';
    } else if(i===chosen) extra = ' selected';
    return `<button class="option-btn${extra}" data-idx="${i}" ${isAnswered?'disabled':''}>${'ABCD'[i]}. ${opt}</button>`;
  }).join('')}</div>
  <div class="actions">${isAnswered ? `<button class="btn btn-primary" id="btnFollowupNext">${S.assQ<qs.length-1?'Next →':'Finish →'}</button>` : ''}</div></div>`;
}
function bindFollowupDynamic() {
  document.querySelectorAll('.option-btn:not([disabled])').forEach(btn => {
    btn.onclick = () => { S.assAnswers[S.assQ] = parseInt(btn.dataset.idx); go(); };
  });
  el('btnFollowupNext')?.addEventListener('click', () => {
    const qs = S.studyConfig.postQ;
    if (S.assQ < qs.length-1) { S.assQ++; go(); }
    else {
      const scorable = qs.filter(q=>!q.isAttention);
      const total = Math.round((scorable.filter((q,i)=>S.assAnswers[qs.indexOf(q)]===q.correct).length / scorable.length)*100);
      S.metrics.followupScore = total;
      S.metrics.followupCompleted = true;
      S.metrics.followupCompletedAt = new Date().toISOString();
      saveLocalProgress();
      S.phase = 'complete';
      go();
    }
  });
}
function isFollowupAvailable() {
  const data = S.metrics || {};
  if (!data.mainCompletedAt) return false;
  if (data.followupCompleted) return false;
  if (!data.followupAvailableAt) return false;
  const availableAt = new Date(data.followupAvailableAt);
  return new Date() >= availableAt;
}
// ============================================================
// MAIN GO FUNCTION
// ============================================================
async function go() {
  const app = document.getElementById('app');
  let html = '';
  switch(S.phase){
    case 'welcome': html = renderWelcome(); break;
    case 'studySelect': html = renderStudySelect(); break;
    case 'orient': html = renderOrient(); break;
    case 'consent': html = renderConsent(); break;
    case 'survey': html = renderSurveyDynamic(); break;
    case 'pre': html = renderAssessmentDynamic('pre'); break;
    case 'study': html = renderStudyDynamic(); break;
    case 'faded': html = renderFadedDynamic(); break;
    case 'attempt': html = renderAttemptDynamic(); break;
    case 'reflect': html = renderReflectDynamic(); break;
    case 'code': html = renderCodeDynamic(); break;
    case 'review': html = renderReviewDynamic(); break;
    case 'post': html = renderAssessmentDynamic('post'); break;
    case 'followup': html = renderFollowupDynamic(); break;
    case 'guided': html = renderGuided(); break;
    case 'debrief': html = renderDebrief(); break;
    case 'complete': html = await renderComplete(); break;
    case 'adminLogin': html = renderAdminLogin(); break;
    case 'dashboard': html = renderDashboard(); break;
    case 'resume': html = renderResume(); break;
    default: html = '<div>Error</div>';
  }
  app.innerHTML = html;
  // Global topbar buttons
  el('btnAudio')?.addEventListener('click',()=>{ S.audioOn = !S.audioOn; go(); });
  el('btnStudySelect')?.addEventListener('click',()=>{ S.phase='studySelect'; go(); });
  el('btnDash')?.addEventListener('click',()=>{ S.prevPhase = S.phase; S.phase='adminLogin'; go(); });
  el('btnLangStudy')?.addEventListener('click',()=>{
    if(S.studyConfig?.bilingual === true) {
      S.studyLang = S.studyLang === 'en' ? 'ha' : 'en';
      saveLocalProgress();
      go();
    }
  });
  el('btnWithdraw')?.addEventListener('click', async () => {
    if(confirm('Are you sure? This will erase your progress and you cannot rejoin this study.')) {
      await apiWithdraw(S.currentEnrolmentId);
      localStorage.removeItem(`research_enrolment_${S.currentEnrolmentId}`);
      S.phase = 'welcome';
      go();
    }
  });
  el('btnLogoutPortal')?.addEventListener('click', () => {
    if (confirm('Logout will end your current session. You can log in again with your matric number to continue where you left off. Continue?')) {
      // Do not clear local storage – keep progress saved
      S.phase = 'welcome';
      S.participantCode = null;
      S.participantName = '';
      S.participantMatric = '';
      S.currentEnrolmentId = null;
      S.currentStudyId = null;
      S.metrics = null;
      S.surveyAnswers = {};
      S.assAnswers = [];
      go();
    }
  });
  // Session timeout reset
  const resetTimer = () => { if (S.currentEnrolmentId) resetTimeoutTimer(); };
  window.addEventListener('click', resetTimer);
  window.addEventListener('keydown', resetTimer);
  if (S.currentEnrolmentId && (S.phase !== 'welcome' && S.phase !== 'studySelect' && S.phase !== 'adminLogin')) {
    resetTimeoutTimer();
  } else {
    if (S.timeoutInterval) clearInterval(S.timeoutInterval);
  }
  // Phase‑specific binding
  switch(S.phase){
    case 'welcome': bindWelcome(); break;
    case 'studySelect': bindStudySelect(); break;
    case 'orient': bindOrient(); break;
    case 'consent': bindConsent(); break;
    case 'survey': bindSurveyDynamic(); break;
    case 'pre': bindAssessmentDynamic('pre'); break;
    case 'study': bindStudyDynamic(); break;
    case 'faded': bindFadedDynamic(); break;
    case 'attempt': bindAttemptDynamic(); break;
    case 'reflect': bindReflectDynamic(); break;
    case 'code': bindCodeDynamic(); break;
    case 'review': bindReviewDynamic(); break;
    case 'post':
      bindAssessmentDynamic('post');
      el('btnBackToStudies')?.addEventListener('click', () => {
        S.phase = 'studySelect';
        go();
      });
      break;
    case 'followup': bindFollowupDynamic(); break;
    case 'guided': bindGuided(); break;
    case 'debrief': bindDebrief(); break;
    case 'complete': bindComplete(); break;
    case 'adminLogin': bindAdminLogin(); break;
    case 'dashboard': bindDashboard(); break;
    case 'resume': bindResume(); break;
    default: break;
  }
}
window.addEventListener('DOMContentLoaded', () => { go(); });
</script>
