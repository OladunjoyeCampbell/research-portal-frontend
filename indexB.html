<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Research Portal – Multi‑Study Participant Hub</title>
<style>
/* ========== Full CSS – same as original, works for all studies ========== */
:root{
  --bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#475569;
  --primary:#1d4ed8;--p2:#2563eb;--success:#166534;--danger:#b91c1c;
  --warn:#92400e;--border:#dbe4f0;--soft:#eff6ff;--soft-warn:#fffbeb;
  --soft-ok:#ecfdf5;--shadow:0 12px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{padding:20px;font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  background:linear-gradient(180deg,#f8fafc,#eef4ff);color:var(--text);line-height:1.5}
#app{max-width:960px;margin:0 auto}
.topbar{background:linear-gradient(135deg,#eff6ff,#f8fafc);border:1px solid var(--border);
  border-radius:24px 24px 0 0;padding:20px 22px 14px;display:flex;gap:14px;
  justify-content:space-between;flex-wrap:wrap;align-items:flex-start}
.brand h1{font-size:1.35rem;font-weight:800;letter-spacing:-.02em}
.brand p{color:var(--muted);font-size:.88rem;max-width:650px;margin-top:4px}
.topbar-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{border:none;padding:9px 15px;border-radius:999px;cursor:pointer;font-weight:700;
  font-size:.88rem;transition:transform .1s,background .15s}
.pill:hover{transform:translateY(-1px)}
.pill-blue{background:var(--primary);color:#fff}
.pill-gray{background:#e2e8f0;color:var(--text)}
.pill-green{background:#dcfce7;color:#166534}
.pill-amber{background:#fef9c3;color:#854d0e}
.phase-strip{background:#fff;border-left:1px solid var(--border);border-right:1px solid var(--border);
  padding:10px 22px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.phase-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e2e8f0;background:#f8fafc;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;
  color:#94a3b8;transition:all .2s}
.phase-dot.done{background:#dcfce7;border-color:#86efac;color:#166534}
.phase-dot.active{background:var(--primary);border-color:var(--primary);color:#fff;
  box-shadow:0 0 0 3px rgba(29,78,216,.2)}
.phase-line{flex:1;height:2px;background:#e2e8f0;min-width:12px;max-width:30px}
.phase-label{font-size:.78rem;font-weight:700;color:var(--muted);margin-left:4px}
.main-card{background:#fff;border:1px solid var(--border);border-radius:0 0 24px 24px;
  padding:22px;box-shadow:var(--shadow)}
.section-title{font-size:1.25rem;font-weight:800;margin-bottom:6px}
.section-sub{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.prog-wrap{background:#f8fafc;border:1px solid var(--border);border-radius:16px;
  padding:12px 14px;margin-bottom:18px}
.prog-row{display:flex;justify-content:space-between;font-weight:700;font-size:.9rem;margin-bottom:8px}
.prog-bar{height:9px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#06b6d4);
  border-radius:999px;transition:width .3s ease}
.card-grid{display:flex;flex-direction:column;gap:9px;min-height:50px}
.card{width:100%;border:1.5px solid #d7e0ec;border-radius:14px;background:#fff;
  padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;
  text-align:left;transition:all .15s;font-size:.92rem}
.card:hover{border-color:#60a5fa;background:#f8fbff;transform:translateY(-1px)}
.card.seq{background:#edf4ff;border-color:#bfdbfe}
.card.locked{background:#f0fdf4;border-color:#86efac;cursor:default;opacity:.85}
.card.study-card{cursor:pointer;background:#fafafa;border-color:#e2e8f0}
.card.study-card:hover{transform:translateY(-2px);background:#f8fbff}
.card-emoji{font-size:1.15rem;width:26px;text-align:center;flex:0 0 auto}
.card-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;
  font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card-lock{width:24px;height:24px;border-radius:50%;background:#86efac;color:#166534;
  font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card-label{flex:1;line-height:1.3}
.card-why{font-size:.8rem;color:var(--muted);margin-top:2px;font-style:italic}
.card-remove{color:#ef4444;font-weight:800;font-size:.95rem;margin-left:auto;padding:2px 4px}
.areas{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px}
.panel{flex:1 1 280px;min-width:260px}
.panel-title{font-size:.95rem;font-weight:700;margin-bottom:10px;color:var(--text)}
.prompt-box{background:#f8fbff;border:1px solid #dbeafe;border-radius:16px;
  padding:13px 15px;margin:12px 0;line-height:1.55;font-size:.92rem}
.subtle-box{color:var(--muted);font-size:.88rem;margin:0 0 14px;line-height:1.5}
.example-box{margin-top:14px;padding:13px 15px;border-radius:16px;background:#fafafa;
  border:1px dashed #cbd5e1;color:#334155;font-size:.88rem}
.hint-box{margin-top:12px;border-radius:16px;padding:12px 14px;background:var(--soft-warn);
  border:1px solid #fde68a;color:var(--warn);line-height:1.5;font-size:.9rem;display:none}
.misconception-box{margin-top:12px;border-radius:16px;padding:12px 14px;
  background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;line-height:1.5;
  font-size:.9rem;display:none}
.feedback-box{margin-top:14px;border-radius:16px;padding:13px 15px;border:1px solid transparent;
  min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;
  line-height:1.5;font-size:.92rem}
.fb-ok{background:var(--soft-ok);border-color:#bbf7d0;color:var(--success);font-weight:700}
.fb-bad{background:#fef2f2;border-color:#fecaca;color:var(--danger)}
.fb-neutral{background:#f8fafc;border-color:var(--border);color:var(--muted)}
.code-block{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:14px;
  font-family:'Courier New',monospace;font-size:.88rem;line-height:1.7;
  overflow-x:auto;white-space:pre;margin:14px 0}
.code-label{font-size:.8rem;font-weight:700;color:#64748b;margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.06em}
.q-wrap{margin-bottom:22px}
.q-text{font-weight:700;margin-bottom:12px;font-size:.95rem;line-height:1.45}
.option-btn{width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:12px;background:#fff;cursor:pointer;margin-bottom:8px;font-size:.9rem;
  transition:all .15s;display:flex;align-items:center;gap:10px}
.option-btn:hover{border-color:#60a5fa;background:#f8fbff}
.option-btn.selected{border-color:var(--primary);background:var(--soft);color:var(--primary);font-weight:700}
.option-btn.correct-ans{border-color:#86efac;background:#f0fdf4;color:var(--success);font-weight:700}
.option-btn.wrong-ans{border-color:#fca5a5;background:#fef2f2;color:var(--danger);font-weight:700}
.option-letter{width:26px;height:26px;border-radius:50%;background:#e2e8f0;color:var(--text);
  font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.reflect-q{background:#fefce8;border:1px solid #fde68a;border-radius:16px;
  padding:14px 16px;margin:14px 0;font-style:italic;color:#854d0e;font-size:.93rem;line-height:1.5}
textarea{width:100%;min-height:90px;border:1.5px solid var(--border);border-radius:14px;
  padding:12px 14px;font-family:inherit;font-size:.9rem;resize:vertical}
textarea:focus{outline:none;border-color:#60a5fa}
.survey-section{margin-bottom:22px}
.survey-section h3{font-size:1rem;font-weight:800;margin-bottom:14px;color:var(--primary);
  padding-bottom:6px;border-bottom:2px solid #dbeafe}
.field-row{margin-bottom:14px}
.field-row label{display:block;font-weight:700;font-size:.88rem;margin-bottom:6px}
.field-row select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;
  font-family:inherit;font-size:.9rem;background:#fff}
.likert-row{margin-bottom:16px}
.likert-row .lq{font-size:.9rem;margin-bottom:8px;line-height:1.45}
.likert-scale{display:flex;gap:6px;justify-content:space-between}
.lk-opt{flex:1;text-align:center}
.lk-opt input{display:none}
.lk-opt label{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  padding:8px 4px;border:1.5px solid var(--border);border-radius:10px;font-size:.75rem;
  color:var(--muted);transition:all .15s;background:#fafafa}
.lk-opt input:checked+label{border-color:var(--primary);background:var(--soft);
  color:var(--primary);font-weight:700}
.lk-num{font-size:1.1rem;font-weight:800}
.consent-box{background:#f8fafc;border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;max-height:340px;overflow-y:auto;font-size:.87rem;line-height:1.7;
  margin:14px 0;color:#334155}
.consent-check{display:flex;align-items:flex-start;gap:12px;padding:14px;
  background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;margin-top:12px;cursor:pointer}
.pcode-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;
  border-radius:16px;padding:16px 20px;text-align:center;margin:16px 0}
.pcode-num{font-size:2rem;font-weight:900;letter-spacing:.15em;color:var(--primary);margin:6px 0}
.orient-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;
  border-bottom:1px solid #f1f5f9}
.orient-icon{font-size:1.4rem;width:32px;text-align:center}
.saved-toast{position:fixed;bottom:22px;right:18px;z-index:9999;
  background:#166534;color:#fff;padding:9px 16px;border-radius:999px;
  font-size:.83rem;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,.22);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.resume-info{background:#f0fdf4;border:1.5px solid #86efac;border-radius:16px;
  padding:16px 18px;margin:14px 0}
.resume-phase{font-size:1.05rem;font-weight:800;color:var(--success);margin-bottom:8px}
.resume-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.resume-stat{background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;text-align:center}
.resume-stat .rnum{font-size:1.5rem;font-weight:900;color:var(--primary);line-height:1}
.resume-stat .rlbl{font-size:.78rem;color:var(--muted);margin-top:3px}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;justify-content:center}
.btn{border:none;border-radius:999px;padding:11px 20px;cursor:pointer;font-weight:700;
  font-size:.9rem;transition:transform .1s,background .15s;min-width:120px}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:#e2e8f0;color:var(--text)}
.btn-success{background:#16a34a;color:#fff}
.btn-warn{background:#d97706;color:#fff}
.btn-sm{padding:8px 14px;min-width:80px;font-size:.83rem}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:16px 0}
.stat-card{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.stat-num{font-size:2rem;font-weight:900;color:var(--primary);line-height:1}
.stat-label{font-size:.82rem;color:var(--muted);margin-top:4px}
.table-wrap{overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{background:#f1f5f9;padding:10px 12px;text-align:left;font-weight:700;
  border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
tr:hover td{background:#f8fbff}
.pill-score{padding:3px 9px;border-radius:999px;font-size:.78rem;font-weight:700}
.pill-hi{background:#dcfce7;color:#166534}
.pill-mid{background:#fef9c3;color:#854d0e}
.pill-lo{background:#fee2e2;color:#991b1b}
.study-step{background:#f8fafc;border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;
  font-size:.82rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:2px}
.step-label{font-weight:700;font-size:.92rem}
.step-why{font-size:.83rem;color:var(--muted);margin-top:4px;line-height:1.45}
.welcome-hero{text-align:center;padding:20px 0 10px}
.welcome-hero h2{font-size:1.7rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
.input-row{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:0 auto 20px}
.input-row label{font-weight:700;font-size:.88rem;margin-bottom:2px;display:block}
.input-row input{padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;
  font-family:inherit;font-size:.95rem;width:100%}
.score-hero{text-align:center;padding:20px 0}
.score-big{font-size:3.5rem;font-weight:900;color:var(--primary);line-height:1}
.gain-badge{display:inline-block;padding:8px 18px;border-radius:999px;font-weight:800;
  font-size:1rem;margin-top:8px}
.gain-pos{background:#dcfce7;color:#166534}
.gain-zero{background:#fef9c3;color:#854d0e}
.cert-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;
  border-radius:20px;padding:24px;text-align:center;margin:20px 0}
.cert-name{font-size:1.4rem;font-weight:900;color:var(--primary);margin:8px 0}
.bottom-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;
  margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
@media print{
  body{padding:0;background:#fff}
  .topbar,.phase-strip,.topbar-btns,.actions,.bottom-nav,.prog-wrap,.hint-box,.misconception-box,.feedback-box{display:none!important}
  .main-card{box-shadow:none;border:none;padding:8px}
  .card{break-inside:avoid}
}
@media(max-width:640px){
  body{padding:10px}
  .main-card{padding:16px}
  .topbar{padding:14px 16px}
  .btn{flex:1}
  .welcome-hero h2{font-size:1.35rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURATION – set API_BASE to your Render backend URL
// ══════════════════════════════════════════════════════════════
const API_BASE = '';  // e.g. 'https://research-portal.onrender.com'
const ETHICS_REF = 'REC/NSPoly/CS/2026/___';
const RESEARCHER_CONTACT = '[Researcher Name, email, phone]';
const ADMIN_PIN = '1234';  // For dashboard access

// ══════════════════════════════════════════════════════════════
//  GLOBAL STATE – fully dynamic, no hardcoded study data
// ══════════════════════════════════════════════════════════════
let S = {
  phase: 'welcome',   // welcome, studySelect, orient, consent, survey, pre, study, faded, attempt, reflect, code, review, post, debrief, complete, pin, dashboard
  participantCode: null,
  participantName: '',
  participantMatric: '',
  demographics: {},
  consentGeneral: false,
  currentEnrolmentId: null,
  currentStudyId: null,
  studyConfig: null,          // loaded from backend: { puzzles, preQ, postQ, surveyFields, bilingual? }
  // Per‑study progress (stored in enrolment.data)
  puzzleIdx: 0,
  available: [], userSeq: [], fadedLocked: [],
  assQ: 0, assAnswers: [], assMode: 'pre',
  surveyAnswers: {},
  reviewQueue: [], reviewIdx: 0,
  metrics: null,              // { startedAt, puzzles: { [puzzleId]: { attempts, completed, guided, ... } } }
  audioOn: false,
  prevPhase: 'welcome',
  prevPuzzleIdx: 0,
  // Bilingual support – only active if studyConfig.bilingual === true
  studyLang: 'en',            // language for current study (en or ha)
  // Lists from API
  availableStudies: [],
  myEnrolments: []
};

// ══════════════════════════════════════════════════════════════
//  HELPER FUNCTIONS
// ══════════════════════════════════════════════════════════════
function L(obj, key) {
  // If the current study is bilingual and we have both versions, use studyLang
  if (S.studyConfig?.bilingual === true && obj && typeof obj === 'object' && (obj[key+'_en'] !== undefined || obj[key+'_ha'] !== undefined)) {
    return S.studyLang === 'en' ? obj[key+'_en'] : obj[key+'_ha'];
  }
  // Otherwise return the English version (or the object itself if string)
  if (typeof obj === 'string') return obj;
  return obj && obj[key+'_en'] !== undefined ? obj[key+'_en'] : (obj[key] || '');
}
function shuffle(a) { let b = [...a]; for(let i=b.length-1; i>0; i--){ let j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function el(id) { return document.getElementById(id); }
function speak(text) {
  if(!S.audioOn || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = S.studyLang === 'ha' ? 'ha' : 'en';
  speechSynthesis.speak(u);
}
function showSavedToast(msg) {
  const old = document.querySelector('.saved-toast');
  if(old) old.remove();
  const d = document.createElement('div');
  d.className = 'saved-toast';
  d.textContent = msg || (S.lang === 'en' ? 'Progress saved' : 'An adana ci gaba');
  document.body.appendChild(d);
  requestAnimationFrame(()=>d.style.opacity='1');
  setTimeout(()=>{d.style.opacity='0'; setTimeout(()=>d.remove(),300);},2500);
}
function saveLocalProgress() {
  if(!S.currentEnrolmentId) return;
  const toStore = {
    phase: S.phase, puzzleIdx: S.puzzleIdx, assQ: S.assQ, assAnswers: S.assAnswers,
    assMode: S.assMode, surveyAnswers: S.surveyAnswers, metrics: S.metrics,
    reviewQueue: S.reviewQueue, reviewIdx: S.reviewIdx,
    available: S.available, userSeq: S.userSeq, fadedLocked: S.fadedLocked,
    studyLang: S.studyLang
  };
  localStorage.setItem(`research_enrolment_${S.currentEnrolmentId}`, JSON.stringify(toStore));
  if(API_BASE && S.currentEnrolmentId){
    fetch(`${API_BASE}/api/progress/${S.currentEnrolmentId}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(toStore)
    }).catch(e=>console.warn);
  }
  showSavedToast();
}
function loadLocalProgress() {
  if(!S.currentEnrolmentId) return null;
  const raw = localStorage.getItem(`research_enrolment_${S.currentEnrolmentId}`);
  if(raw) return JSON.parse(raw);
  return null;
}

// ══════════════════════════════════════════════════════════════
//  API CALLS
// ══════════════════════════════════════════════════════════════
async function apiFetchStudies() {
  if(!API_BASE) return [];
  try{
    const res = await fetch(`${API_BASE}/api/studies`);
    if(!res.ok) return [];
    return await res.json();
  }catch(e){ return []; }
}
async function apiFetchStudyConfig(studyId) {
  if(!API_BASE) return null;
  try{
    const res = await fetch(`${API_BASE}/api/studies/${studyId}/config`);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}
async function apiEnrol(name, matric, lang, studyId, demographics, consentGeneral) {
  if(!API_BASE) throw new Error('API not configured');
  const res = await fetch(`${API_BASE}/api/enrol`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,matric,lang,studyId,demographics,consentGeneral})
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function apiGetMyEnrolments(participantCode) {
  if(!API_BASE) return [];
  const res = await fetch(`${API_BASE}/api/enrolments/me?code=${encodeURIComponent(participantCode)}`);
  if(!res.ok) return [];
  return res.json();
}
async function apiLoadProgress(enrolmentId) {
  if(!API_BASE) return null;
  const res = await fetch(`${API_BASE}/api/progress/${enrolmentId}`);
  if(!res.ok) return null;
  return res.json();
}

// ══════════════════════════════════════════════════════════════
//  RENDER FUNCTIONS (fully generic, using S.studyConfig)
// ══════════════════════════════════════════════════════════════
function topbarHTML() {
  const t = (s) => s; // portal is English only
  return `<div class="topbar">
    <div class="brand"><h1>🔬 Research Portal</h1>
    <p>Multi‑study research participation hub</p></div>
    <div class="topbar-btns">
      <button class="pill ${S.audioOn ? 'pill-green' : 'pill-gray'}" id="btnAudio">${S.audioOn ? '🔊' : '🔇'} Audio</button>
      ${S.phase !== 'welcome' && S.phase !== 'studySelect' && S.phase !== 'dashboard' && S.currentStudyId ? `<button class="pill pill-amber" id="btnStudySelect">📚 All studies</button>` : ''}
      ${S.phase !== 'welcome' && S.phase !== 'dashboard' ? `<button class="pill pill-amber" id="btnDash">📊 Dashboard</button>` : ''}
      ${S.studyConfig?.bilingual === true && (S.phase !== 'welcome' && S.phase !== 'studySelect' && S.phase !== 'pin' && S.phase !== 'dashboard') ? `<button class="pill pill-blue" id="btnLangStudy">${S.studyLang === 'en' ? 'Hausa' : 'English'}</button>` : ''}
    </div>
  </div>`;
}
function phaseStripHTML() {
  if(S.phase === 'welcome' || S.phase === 'studySelect' || S.phase === 'pin' || S.phase === 'dashboard') return '';
  const phases = [
    {k:'pre', l:'Pre-test'},
    {k:'learn',l:'Learn'},
    {k:'review',l:'Review'},
    {k:'post',l:'Post-test'},
    {k:'complete',l:'Done'}
  ];
  const groupMap = {orient:'pre',consent:'pre',survey:'pre',pre:'pre',study:'learn',faded:'learn',attempt:'learn',reflect:'learn',code:'learn',review:'review',post:'post',debrief:'post',complete:'complete'};
  const cur = groupMap[S.phase] || 'pre';
  const order = ['pre','learn','review','post','complete'];
  const curIdx = order.indexOf(cur);
  return `<div class="phase-strip">${order.map((p,i)=>{
    const ph = phases.find(x=>x.k===p);
    const st = i<curIdx?'done':i===curIdx?'active':'';
    return `<span class="phase-dot ${st}" title="${ph.l}">${p==='pre'?'📋':p==='learn'?'👁':p==='review'?'🔁':p==='post'?'📋':'🎓'}</span>${i<order.length-1?'<span class="phase-line"></span>':''}`;
  }).join('')}<span class="phase-label">${phases.find(x=>x.k===cur).l}</span></div>`;
}

async function onSelectStudy(studyId) {
  try {
    const config = await apiFetchStudyConfig(studyId);
    if(!config || !config.puzzles) throw new Error('Study configuration missing');
    S.studyConfig = config;
    // Set study language default to English
    S.studyLang = 'en';
    let enrolment = S.myEnrolments.find(e => e.study_id === studyId);
    if(enrolment) {
      S.currentEnrolmentId = enrolment.id;
      const local = loadLocalProgress();
      if(local) {
        Object.assign(S, local);
        if(local.studyLang) S.studyLang = local.studyLang;
      } else {
        const remote = await apiLoadProgress(enrolment.id);
        if(remote?.progress) Object.assign(S, remote.progress);
      }
      S.currentStudyId = studyId;
      S.phase = 'orient';
    } else {
      const enrolRes = await apiEnrol(S.participantName, S.participantMatric, 'en', studyId, S.demographics, S.consentGeneral);
      S.currentEnrolmentId = enrolRes.enrolmentId;
      S.currentStudyId = studyId;
      S.myEnrolments.push({ id: enrolRes.enrolmentId, study_id: studyId, status: 'enrolled', study: { title_en: S.availableStudies.find(s=>s.id===studyId).title_en } });
      S.metrics = { startedAt: Date.now(), puzzles: {} };
      saveLocalProgress();
      S.phase = 'orient';
    }
    go();
  } catch(e) { alert(e.message); }
}

function renderAssessmentDynamic(mode) {
  const qs = mode === 'pre' ? S.studyConfig.preQ : S.studyConfig.postQ;
  if(!qs || !qs.length) return `<div class="main-card">No questions</div>`;
  const q = qs[S.assQ];
  const isAnswered = S.assAnswers[S.assQ] !== undefined;
  const chosen = S.assAnswers[S.assQ];
  const isPost = mode === 'post';
  return `${topbarHTML()}${phaseStripHTML()}<div class="main-card"><div class="prog-wrap"><div class="prog-row"><span>${mode==='pre'?'Pre‑test':'Post‑test'} – Question ${S.assQ+1}/${qs.length}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${((S.assQ+1)/qs.length)*100}%"></div></div></div>
  <div class="q-wrap"><p class="q-text">${L(q,'q')}</p>${(L(q,'opts')).map((opt,i)=>{
    let extra = '';
    if(isAnswered && (isPost || q.isAttention)) {
      if(i===q.correct) extra = ' correct-ans';
      else if(i===chosen && chosen!==q.correct) extra = ' wrong-ans';
    } else if(i===chosen) extra = ' selected';
    return `<button class="option-btn${extra}" data-idx="${i}" ${isAnswered?'disabled':''}>${'ABCD'[i]}. ${opt}</button>`;
  }).join('')}</div>
  <div class="actions">${isAnswered ? `<button class="btn btn-primary" id="btnAssNext">${S.assQ<qs.length-1?'Next →':'Finish →'}</button>` : ''}</div></div>`;
}
function bindAssessmentDynamic(mode) {
  document.querySelectorAll('.option-btn:not([disabled])').forEach(btn => {
    btn.onclick = () => { S.assAnswers[S.assQ] = parseInt(btn.dataset.idx); go(); };
  });
  el('btnAssNext')?.addEventListener('click', () => {
    const qs = mode === 'pre' ? S.studyConfig.preQ : S.studyConfig.postQ;
    if(S.assQ < qs.length-1) { S.assQ++; go(); }
    else {
      const scorable = qs.filter(q=>!q.isAttention);
      const total = Math.round((scorable.filter((q,i)=>S.assAnswers[qs.indexOf(q)]===q.correct).length / scorable.length)*100);
      if(!S.metrics) S.metrics = { puzzles: {} };
      if(mode === 'pre') S.metrics.preScore = total;
      else S.metrics.postScore = total;
      saveLocalProgress();
      if(mode === 'pre') { S.phase = 'study'; S.puzzleIdx = 0; go(); }
      else { S.phase = 'debrief'; go(); }
    }
  });
}

function renderCardsDynamic() {
  const av = el('availCards'), sq = el('seqCards');
  if(!av||!sq) return;

}
function renderFadedDynamic() {

function bindFadedDynamic() {

    const fb = el('attemptFB'), hb = el('attemptHint'), mb = el('attemptMiscon');

}
function initReviewDynamic() {
  const completed = S.studyConfig.puzzles.filter((_,idx)=>S.metrics.puzzles[idx]?.completed).map((_,idx)=>idx);
  const pool = completed.length>=3 ? completed : [...completed, ...S.studyConfig.puzzles.map((_,i)=>i).filter(i=>!completed.includes(i)).slice(0,3-completed.length)];
  S.reviewQueue = shuffle(pool).slice(0,3);
  S.reviewIdx = 0;
  S.phase = 'review';
  const rp = S.studyConfig.puzzles[S.reviewQueue[0]];
  if(rp){ S.fadedLocked=[]; S.available=shuffle(rp.cards); S.userSeq=[]; }
}

function renderDebrief() {
  const gain = (S.metrics?.postScore && S.metrics?.preScore) ? S.metrics.postScore - S.metrics.preScore : null;
  return `${topbarHTML()}${phaseStripHTML()}<div class="main-card"><div class="cert-box"><div class="pcode-num">${S.participantCode}</div>${gain!==null?`<p>Learning gain: ${gain>=0?'+':''}${gain}%</p>`:''}</div><div class="actions"><button class="btn btn-primary" id="btnDebriefNext">View results →</button></div></div>`;
}
function bindDebrief() {
  el('btnDebriefNext')?.addEventListener('click',()=>{ S.phase='complete'; go(); });
}
function renderComplete() {
  const solved = Object.values(S.metrics?.puzzles||{}).filter(p=>p.completed).length;
  return `${topbarHTML()}<div class="main-card"><div class="score-hero"><div class="score-big">${solved}/${S.studyConfig.puzzles.length}</div><p>puzzles solved</p></div><div class="actions"><button class="btn btn-secondary" id="btnViewDash">📊 Dashboard</button><button class="btn btn-primary" id="btnPrintCert">🖨 Print certificate</button></div></div>`;
}
function bindComplete() {
  el('btnViewDash')?.addEventListener('click',()=>{ S.prevPhase='complete'; S.phase='pin'; go(); });
  el('btnPrintCert')?.addEventListener('click',()=>window.print());
}
function renderPin() {
  return `${topbarHTML()}<div class="main-card"><h2>🔐 Instructor Access</h2><div class="input-row"><input type="password" id="pinInput" placeholder="PIN" /></div><div id="pinError" style="color:var(--danger)"></div><div class="actions"><button class="btn btn-secondary" id="btnPinCancel">Cancel</button><button class="btn btn-primary" id="btnPinEnter">Enter</button></div></div>`;
}
function bindPin() {
  const tryPin = () => {
    if(el('pinInput')?.value === ADMIN_PIN) { S.phase='dashboard'; go(); }
    else el('pinError').innerText = 'Wrong PIN';
  };
  el('pinInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter') tryPin(); });
  el('btnPinEnter')?.addEventListener('click',tryPin);
  el('btnPinCancel')?.addEventListener('click',()=>{ S.phase=S.prevPhase||'welcome'; go(); });
}
function renderDashboard() {
  return `${topbarHTML()}<div class="main-card"><h2>📊 Researcher Dashboard</h2><p>Data from all studies.</p><div class="actions"><button class="btn btn-secondary" id="btnExportCSV">📊 Export CSV</button><button class="btn btn-primary" id="btnDashBack">← Back</button></div></div>`;
}
function bindDashboard() {
  el('btnExportCSV')?.addEventListener('click',()=>{ alert('Export endpoint would be called here'); });
  el('btnDashBack')?.addEventListener('click',()=>{ S.phase=S.prevPhase||'studySelect'; go(); });
}

// ══════════════════════════════════════════════════════════════
//  MAIN GO & BIND DISPATCH
// ══════════════════════════════════════════════════════════════
function go() {
  const app = document.getElementById('app');
  let html = '';
  switch(S.phase){
    case 'welcome': html = renderWelcome(); break;
    case 'studySelect': html = renderStudySelect(); break;
    case 'orient': html = renderOrient(); break;
    case 'consent': html = renderConsent(); break;
    case 'survey': html = renderSurveyDynamic(); break;
    case 'pre': html = renderAssessmentDynamic('pre'); break;
    case 'study': html = renderStudyDynamic(); break;
    case 'faded': html = renderFadedDynamic(); break;
    case 'attempt': html = renderAttemptDynamic(); break;
    case 'reflect': html = renderReflectDynamic(); break;
    case 'code': html = renderCodeDynamic(); break;
    case 'review': html = renderReviewDynamic(); break;
    case 'post': html = renderAssessmentDynamic('post'); break;
    case 'debrief': html = renderDebrief(); break;
    case 'complete': html = renderComplete(); break;
    case 'pin': html = renderPin(); break;
    case 'dashboard': html = renderDashboard(); break;
    default: html = '<div>Error</div>';
  }
  app.innerHTML = html;
  // Bind global topbar buttons
  el('btnAudio')?.addEventListener('click',()=>{ S.audioOn = !S.audioOn; go(); });
  el('btnStudySelect')?.addEventListener('click',()=>{ S.phase='studySelect'; go(); });
  el('btnDash')?.addEventListener('click',()=>{ S.prevPhase=S.phase; S.phase='pin'; go(); });
  el('btnLangStudy')?.addEventListener('click',()=>{
    if(S.studyConfig?.bilingual === true) {
      S.studyLang = S.studyLang === 'en' ? 'ha' : 'en';
      saveLocalProgress();
      go();
    }
  });
  // Phase‑specific binding
  switch(S.phase){
    case 'welcome': bindWelcome(); break;
    case 'studySelect': bindStudySelect(); break;
    case 'orient': bindOrient(); break;
    case 'consent': bindConsent(); break;
    case 'survey': bindSurveyDynamic(); break;
    case 'pre': bindAssessmentDynamic('pre'); break;
    case 'study': bindStudyDynamic(); break;
    case 'faded': bindFadedDynamic(); break;
    case 'attempt': bindAttemptDynamic(); break;
    case 'reflect': bindReflectDynamic(); break;
    case 'code': bindCodeDynamic(); break;
    case 'review': bindReviewDynamic(); break;
    case 'post': bindAssessmentDynamic('post'); break;
    case 'debrief': bindDebrief(); break;
    case 'complete': bindComplete(); break;
    case 'pin': bindPin(); break;
    case 'dashboard': bindDashboard(); break;
  }
}

// ══════════════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => { go(); });
</script>
</body>
</html>
